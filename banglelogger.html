<!DOCTYPE html>
<html>

<head>
    <title>Bangle.js Hybrid Streaming</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.rawgit.com/kimeiga/bahunya/css/bahunya-0.1.1.css" />
</head>

<body>
    <script src="https://www.puck-js.com/puck.js="text-align: center;">Bangle.js Hybrid Data Streaming App</h2>

    <main>
        <article>
            <p id="pMain">Ready to connect</p>
            <button id="btnConnect">Connect</button>

            <h3>Realtime values:</h3>
            <p>X: <span id="pX"></span></p>
            <p>Y: <span id="pY"></span></p>
            <p>Z: <span id="pZ"></span></p>
            <p>HR: <span id="pHR"></span></p>
        </article>
    </main>

    <script>
        /****************************************************
         * Hybrid WebApp: JSON streaming + old UI structure
         ****************************************************/

        let btnConnect = document.getElementById("btnConnect");
        let pMain = document.getElementById("pMain");
        let pX = document.getElementById("pX");
        let pY = document.getElementById("pY");
        let pZ = document.getElementById("pZ");
        let pHR = document.getElementById("pHR");

        let connection;
        let buf = "";

        let result = {};

        // Detect browser saving capability
        try {
            new Blob();
        } catch (e) {
            pMain.textContent = 'File saving not supported';
            btnConnect.disabled = true;
        }

        /****************************************************
         * Helper: Send JSON to Bangle
         ****************************************************/
        function sendJSON(obj) {
            if (!connection) return;
            const s = JSON.stringify(obj);
            connection.write(s + "\n");
        }

        /****************************************************
         * Handle JSON data from Bangle
         ****************************************************/
        function onJSON(data) {
            // ACCEL
            if (data.accel) {
                pX.textContent = data.accel.x;
                pY.textContent = data.accel.y;
                pZ.textContent = data.accel.z;

                result.accel.push({
                    ts: Date.now(),
                    ...data.accel
                });
            }

            // HEART RATE
            if (data.hr !== undefined) {
                pHR.textContent = data.hr + " bpm";
                result.heartRate.push({
                    ts: Date.now(),
                    hr: data.hr,
                    conf: data.hrConfidence
                });
            }

            // GPS (optional – depends on watch model)
            if (data.gps) {
                result.gps.push({
                    ts: Date.now(),
                    ...data.gps
                });
            }
        }

        /****************************************************
         * Handle incoming text → split → parse JSON
         ****************************************************/
        function onLine(line) {
            try {
                const json = JSON.parse(line);
                onJSON(json);
            } catch (e) {
                console.log("Non-JSON line:", line);
            }
        }

        /****************************************************
         * MAIN CONNECT/DISCONNECT FLOW
         ****************************************************/
        btnConnect.addEventListener("click", function () {

            // If connected → disconnect and save file
            if (connection) {
                connection.close();
                connection = undefined;

                pMain.textContent = "Ready to connect";
                btnConnect.textContent = "Connect";

                result.endTs = new Date();

                // Save file
                let filename = "bangle_test_" + Date.now() + ".json";
                let blob = new Blob([JSON.stringify(result)], { type: "application/json" });
                saveAs(blob, filename);

                return;
            }

            /****************************************************
             * Connect to Bangle
             ****************************************************/
            Puck.connect(function (c) {
                if (!c) return;

                connection = c;
                pMain.textContent = "Connected!";
                btnConnect.textContent = "Disconnect";

                // Init result buffer
                result = {
                    startTs: new Date(),
                    accel: [],
                    heartRate: [],
                    gps: []
                };

                buf = "";

                /****************************************************
                 * Incoming BLE stream
                 ****************************************************/
                connection.on("data", function (d) {
                    buf += d;
                    let lines = buf.split("\n");
                    buf = lines.pop();
                    lines.forEach(onLine);
                });

                /****************************************************
                 * Do NOT upload code — instead tell Bangle we're ready
                 ****************************************************/
                sendJSON({ cmd: "hello" });

                // Auto-start streaming immediately
                sendJSON({
                    cmd: "start",
                    sensors: ["accel", "hrm"],
                    interval: 200
                });

                console.log("Ready.");
            });
        });

    </script>
</body>
</html>
