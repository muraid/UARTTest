<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.rawgit.com/kimeiga/bahunya/css/bahunya-0.1.1.css" />
    <title>Bangle.js Data Collection</title>
</head>

<body>

<h2 style="text-align: center;">Data Collection Web App</h2>

<main>
<article>

    <h3 id="statusText">Not connected</h3>

    <section style="margin-bottom: 20px;">
        <button id="connectBtn">Connect watch</button>
    </section>

    <section style="margin-bottom: 20px;">
    <button id="startHRBtn">Start HRM</button>
    <button id="startMAGBtn">Start MAG</button>
    <button id="startACCELBtn">Start Accel</button>
        
    </section>

    <section style="margin-bottom: 20px;">
        <label>
            Test name:
            <input type="text" id="testName" placeholder="e.g. test1">
        </label>
    </section>

    <section>
        <button id="startBtn">Start</button>
    </section>

</article>
</main>

<!-- Libraries -->
<script src="https://www.puck-js.com/puck.js"></script>
<script src="docs/deps/FileSaver.js"></script>

<!-- Your app logic -->
<script type="module" src="test.js"></script>

</body>
</html>
